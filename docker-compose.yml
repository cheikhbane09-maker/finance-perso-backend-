version: '3.8'

services:
  api:
    build: .
    container_name: finance-perso-api
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 1d
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: finance_perso
      REDIS_URL: redis://redis:6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: finance-perso-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_perso
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: finance-perso-redis
    ports:
      - '6379:6379'

  prometheus:
    image: prom/prometheus:latest
    container_name: finance-perso-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: finance-perso-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - '3001:3000'
    depends_on:
      - prometheus

volumes:
  mysql-data:
